<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
<meta charset="UTF-8">
<title>Viaje Seguro</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
rel="stylesheet">
</head>
<body>
<div class="container mt-5">
	<div class="row justify-content-center">
		<div class="col-md-8">
			<div class="card shadow">
				<div class="card-header bg-primary text-white">
					<h2 class="text-center">
						VIAJE SEGURO
					</h2>
				</div>
				<div class="card-body">
					<form th:action="@{/buscar}" method="get">
						<div class="row">
							<div class="col-md-4">
								<label>Origen</label>
							<select name="origen" class="form-select">
									<option value="">
										Seleccione
									</option>

					<option
					th:each="c: ${ciudades}"
					th:value="${c.idCiudad}"
					th:text="${c.nombre}"
					th:selected="${c.idCiudad == origenSeleccionado}">
					</option>
					</select>
					</div>
					<div class="col-md-4">
					<label>Destino</label>
					<select name="destino" class="form-select">
						<option value="">
						Seleccione
						</option>
						<option
						th:each="c : ${ciudades}"
						th:value="${c.idCiudad}"
						th:text="${c.nombre}"
						th:selected="${c.idCiudad == destinoSeleccionado}">
						</option>
						</select>
						</div>
						<div class="col-md-4">
						<label>Fecha</label>
<input type="date" name="fecha" class="form-control" th:value="${fechaSeleccionada}">
							</div>
						</div>
						<div class="text-center mt-4">
			<button type="submit" class="btn btn-success btn-lg">
								BUSCAR
							</button>
						</div>
					</form>
					
					<hr>
										<div th:if="${horarios!=null}">
										    <h4>Resultados encontrados</h4>
										    <table class="table table-bordered">
										        <thead>
										            <tr>
										                <th>Bus</th>
										                <th>Ruta</th>
										                <th>Fecha</th>
										                <th>Hora</th>
										            </tr>
										        </thead>
										        <tbody>
										            <tr th:each="h : ${horarios}">
										                <td th:text="${h.bus.placa}"></td>
										                <td>
						<span th:text="${h.ruta.ciudadOrigen.nombre}"></span>
										                    -
						<span th:text="${h.ruta.ciudadDestino.nombre}"></span>
										                </td>
							 <td th:text="${h.fechaSalida}"></td>
					<td th:text="${h.horaSalida}"></td>
										            </tr>
										        </tbody>
										    </table>
										</div>						
					
				</div>
			</div>
		</div>
	</div>
</div>
</body>
</html>
